<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Transaction History System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>Bank Transaction History System</h1>
    <p class="subtitle">Singly Linked List (tail pointer) &middot; Merge Sort &middot; Precalculated Monthly Stats</p>
  </header>

  <main>
    <section class="card">
      <h2>Add Transaction</h2>
      <form id="txn-form">
        <div class="field">
          <label for="transaction_id">Transaction ID</label>
          <input type="text" id="transaction_id" name="transaction_id" placeholder="T001" required>
        </div>
        <div class="field">
          <label for="transaction_type">Type</label>
          <select id="transaction_type" name="transaction_type" required>
            <option value="deposit">Deposit</option>
            <option value="withdrawal">Withdrawal</option>
          </select>
        </div>
        <div class="field">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="5000.00" required>
        </div>
        <div class="field">
          <label for="timestamp">Timestamp</label>
          <input type="datetime-local" id="timestamp" name="timestamp" required>
        </div>
        <div class="field">
          <label for="balance_after">Balance After</label>
          <input type="number" id="balance_after" name="balance_after" step="0.01" placeholder="15000.00" required>
        </div>
        <button type="submit">Add Transaction</button>
      </form>
      <p id="txn-result" class="result" role="status"></p>
    </section>

    <section class="card">
      <h2>Monthly / Yearly Report</h2>
      <div class="field inline">
        <label for="month-select">Month</label>
        <select id="month-select">
          <option value="all">All (yearly summary)</option>
          <option value="1">1 - January</option>
          <option value="2">2 - February</option>
          <option value="3">3 - March</option>
          <option value="4">4 - April</option>
          <option value="5">5 - May</option>
          <option value="6">6 - June</option>
          <option value="7">7 - July</option>
          <option value="8">8 - August</option>
          <option value="9">9 - September</option>
          <option value="10">10 - October</option>
          <option value="11">11 - November</option>
          <option value="12">12 - December</option>
        </select>
        <button id="fetch-report">Get Report</button>
      </div>
      <div id="report-output"></div>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
